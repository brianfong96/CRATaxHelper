# CRA Tax Helper — Local Docker Compose
#
# Runs two services:
#   taxhelper  — the CRA Tax Helper web app  (port 8080)
#   archive    — local SQLite-backed storage sidecar (internal only, port 7000)
#
# Quick start:
#   Windows:  .\scripts\start-local.ps1
#   Mac/Linux: ./scripts/start-local.sh
#
# Or manually:
#   1. Copy .env.example to .env and fill in FIELD_ENCRYPTION_KEY
#   2. docker compose up --build

services:
  taxhelper:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # ── Auth: disabled for local use — no login required ──────────────────
      AUTH_ENABLED: "false"
      SESSION_SECRET: ""
      ROOT_PATH: ""

      # ── Local user identity (shown in the UI, used for data ownership) ────
      LOCAL_USER_EMAIL: "${LOCAL_USER_EMAIL:-local@cra-helper.local}"
      LOCAL_USER_NAME: "${LOCAL_USER_NAME:-Local User}"

      # ── Local Archive sidecar ─────────────────────────────────────────────
      ARCHIVE_URL: "http://archive:7000"

      # ── Encryption key for data at rest (auto-generated by start scripts) ─
      # Leave empty to skip encryption (not recommended).
      FIELD_ENCRYPTION_KEY: "${FIELD_ENCRYPTION_KEY:-}"

      GATEWAY_URL: ""
    depends_on:
      archive:
        condition: service_healthy
    volumes:
      # Persist uploaded CRA PDF forms across restarts
      - pdf_forms:/app/app/static/forms
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  archive:
    build:
      context: ./archive-local
      dockerfile: Dockerfile
    environment:
      DB_PATH: "/data/archive.db"
    volumes:
      # All tax data stored here — back this folder up to keep your data safe
      - archive_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  archive_data:
    # Your saved tax form data lives here.
    # To back it up: docker run --rm -v crataxhelper_archive_data:/data -v $(pwd):/backup alpine tar czf /backup/taxdata-backup.tar.gz /data
  pdf_forms:
    # Uploaded CRA PDF templates live here.
