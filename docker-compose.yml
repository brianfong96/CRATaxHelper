# CRA Tax Helper — Local Docker Compose
#
# Runs completely standalone — no .env file, no account, no internet needed.
#
# Quick start:
#   Windows:   .\scripts\start-local.ps1
#   Mac/Linux: ./scripts/start-local.sh
#
# Or just:   docker compose up --build

services:
  taxhelper:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # ── Auth OFF: no login required in local mode ─────────────────────────
      AUTH_ENABLED: "false"
      SESSION_SECRET: ""
      GATEWAY_URL: ""
      ROOT_PATH: ""

      # ── Local user shown in the UI ────────────────────────────────────────
      LOCAL_USER_EMAIL: "local@cra-helper.local"
      LOCAL_USER_NAME: "Local User"

      # ── Local Archive sidecar ─────────────────────────────────────────────
      ARCHIVE_URL: "http://archive:7000"

      # ── Encryption OFF: local data is stored as plain JSON on your machine ─
      # Production deployments inject FIELD_ENCRYPTION_KEY via deploy.ps1.
      FIELD_ENCRYPTION_KEY: ""
    depends_on:
      archive:
        condition: service_healthy
    volumes:
      # Persist uploaded CRA PDF forms across restarts
      - pdf_forms:/app/app/static/forms
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  archive:
    build:
      context: ./archive-local
      dockerfile: Dockerfile
    environment:
      DB_PATH: "/data/archive.db"
    volumes:
      # All tax data lives here — back up this volume to keep your data safe
      - archive_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  archive_data:   # Tax form data (SQLite). Back up with: docker compose run --rm archive tar czf - /data > taxdata.tar.gz
  pdf_forms:      # Uploaded CRA PDF templates.
